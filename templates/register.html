{% extends 'base.html' %}
{% block title %}BLUE | Create Account{% endblock %}
{% block body_class %}auth-page{% endblock %}
{% block content %}
<section class="auth-card auth-blue-panel">
  <div class="section-title center">Create Account</div>
  <form method="post" class="auth-form">
    <label>
      <span>Username</span>
      <input type="text" name="username" required>
    </label>
    <label>
      <span>Password</span>
      <input type="password" name="password" required>
    </label>
    <label>
      <span>Confirm Password</span>
      <input type="password" name="confirm_password" required>
    </label>
    <label>
      <span>Company</span>
      <select name="company_id" required>
        <option value="">Select company</option>
        {% for company in companies %}
          <option value="{{ company.CompanyID }}">{{ company.CompanyName }}</option>
        {% endfor %}
      </select>
    </label>
    <button type="submit" class="pixel-btn primary">Create</button>
    <a href="{{ url_for('login') }}" class="pixel-btn secondary link-btn">Back to Login</a>
  </form>
</section>
{% endblock %}
